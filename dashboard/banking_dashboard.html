<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banking Analytics Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --primary: #1f4e79;
      --primary-light: #2f74b5;
      --accent: #2aa198;
      --text: #1b263b;
      --muted: #6b778d;
      --danger: #d9534f;
      --success: #2e7d32;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 1300px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 1.7rem;
      color: var(--primary);
    }

    .tabs {
      display: flex;
      gap: 10px;
      background: var(--surface);
      border-radius: 999px;
      padding: 6px;
      box-shadow: var(--shadow);
    }

    .tab {
      border: none;
      background: transparent;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab.active {
      background: var(--primary);
      color: #fff;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .control-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    select {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #dbe3ef;
      background: #fff;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    .kpi {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      position: relative;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .kpi:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.14);
    }

    .kpi .icon {
      font-size: 1.2rem;
      margin-bottom: 10px;
      display: inline-block;
      background: #edf3fb;
      padding: 8px;
      border-radius: 10px;
    }

    .kpi h3 {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 600;
    }

    .kpi .value {
      margin-top: 8px;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--primary);
    }

    .charts {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      transition: transform 0.25s ease;
      animation: fadeIn 0.5s ease;
    }

    .card:hover {
      transform: translateY(-3px);
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 1rem;
      color: var(--primary);
    }

    .span-6 { grid-column: span 6; }
    .span-4 { grid-column: span 4; }
    .span-8 { grid-column: span 8; }
    .span-12 { grid-column: span 12; }

    @media (max-width: 900px) {
      .span-6, .span-4, .span-8, .span-12 {
        grid-column: span 12;
      }
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .insights-section {
      background: linear-gradient(135deg, #e8f3f9 0%, #f0f9ff 100%);
      border-radius: var(--radius);
      padding: 24px;
      margin-top: 24px;
      border-left: 5px solid var(--primary);
    }

    .insights-section h2 {
      margin: 0 0 16px;
      font-size: 1.3rem;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .insights-list {
      display: grid;
      gap: 12px;
    }

    .insight-item {
      background: var(--surface);
      padding: 12px 14px;
      border-radius: 10px;
      border-left: 3px solid var(--accent);
      font-size: 0.95rem;
      color: var(--text);
      line-height: 1.5;
    }

    .recommendations-section {
      background: linear-gradient(135deg, #fff8e1 0%, #fffbf0 100%);
      border-radius: var(--radius);
      padding: 24px;
      margin-top: 24px;
      border-left: 5px solid #f59e0b;
    }

    .recommendations-section h2 {
      margin: 0 0 16px;
      font-size: 1.3rem;
      color: #f59e0b;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .recommendations-list {
      display: grid;
      gap: 14px;
    }

    .recommendation-item {
      background: var(--surface);
      padding: 14px;
      border-radius: 10px;
      border-left: 4px solid #f59e0b;
    }

    .recommendation-item strong {
      color: var(--primary);
      font-size: 0.95rem;
    }

    .recommendation-item p {
      margin: 6px 0 0;
      color: var(--text);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>💳 Banking Analytics Dashboard</h1>
      <div class="tabs">
        <button class="tab active" data-tab="overview">Overview</button>
        <button class="tab" data-tab="customers">Customers</button>
        <button class="tab" data-tab="revenue">Revenue</button>
      </div>
    </div>

    <div class="controls">
      <div class="control-card">
        <label for="regionFilter">Filter by Region</label>
        <select id="regionFilter"></select>
      </div>
      <div class="control-card">
        <label for="segmentFilter">Filter by Segment</label>
        <select id="segmentFilter"></select>
      </div>
    </div>

    <div class="kpis" id="kpiContainer"></div>

    <section id="overview" class="tab-content active">
      <div class="charts">
        <div class="card span-6">
          <h3>Spend by Region</h3>
          <canvas id="regionSpendChart"></canvas>
        </div>
        <div class="card span-6">
          <h3>Customer Segments</h3>
          <canvas id="segmentPieChart"></canvas>
        </div>
        <div class="card span-8">
          <h3>Monthly Spending Trend</h3>
          <canvas id="monthlyTrendChart"></canvas>
        </div>
        <div class="card span-4">
          <h3>Active vs Inactive Customers</h3>
          <canvas id="activeInactiveChart"></canvas>
        </div>
        <div class="card span-6">
          <h3>Revenue by Segment</h3>
          <canvas id="revenueSegmentChart"></canvas>
        </div>
      </div>

      <div class="insights-section">
        <h2>💡 Key Insights</h2>
        <div class="insights-list" id="keyInsights"></div>
      </div>

      <div class="recommendations-section">
        <h2>🎯 Business Recommendations</h2>
        <div class="recommendations-list" id="recommendations"></div>
      </div>
    </section>

    <section id="customers" class="tab-content">
      <div class="charts">
        <div class="card span-6">
          <h3>Transactions by Category</h3>
          <canvas id="categoryTxChart"></canvas>
        </div>
        <div class="card span-6">
          <h3>Customer Segments (Filtered View)</h3>
          <canvas id="segmentBarChart"></canvas>
        </div>
      </div>
    </section>

    <section id="revenue" class="tab-content">
      <div class="charts">
        <div class="card span-12">
          <h3>Revenue (Total Spend) by Region</h3>
          <canvas id="revenueRegionChart"></canvas>
        </div>
      </div>
    </section>
  </div>

  <script>
    // Generate 250 customer records with realistic data
    function generateCustomers() {
      const regions = ["North", "South", "East", "West"];
      const segments = ["Low", "Medium", "High"];
      const firstNames = ["John", "Jane", "Michael", "Emily", "David", "Sarah", "Robert", "Jessica", "William", "Linda", "Richard", "Barbara", "Joseph", "Susan", "Thomas", "Lisa", "Charles", "Patricia", "Daniel", "Karen"];
      const lastNames = ["Smith", "Johnson", "Williams", "Brown", "Jones", "Garcia", "Miller", "Davis", "Rodriguez", "Martinez", "Hernandez", "Lopez", "Gonzalez", "Wilson", "Anderson", "Thomas", "Taylor", "Moore", "Jackson", "Martin"];

      const customers = [];
      for (let i = 1; i <= 250; i++) {
        const age = Math.floor(Math.random() * (65 - 22) + 22);
        const region = regions[Math.floor(Math.random() * regions.length)];
        const baseIncome = Math.floor(Math.random() * (150000 - 35000) + 35000);
        let segment = "Low";
        if (baseIncome > 100000) segment = "High";
        else if (baseIncome > 65000) segment = "Medium";

        const creditLimit = Math.floor(baseIncome / 7);
        const spendRatio = 0.25 + Math.random() * 0.35;
        const totalSpend = Math.floor(creditLimit * spendRatio);

        customers.push({
          customer_id: i,
          age,
          gender: Math.random() > 0.5 ? "Male" : "Female",
          region,
          income: baseIncome,
          credit_limit: creditLimit,
          total_spend: totalSpend,
          transactions: Math.floor(20 + Math.random() * 80),
          is_active: Math.random() > 0.25,
          segment
        });
      }
      return customers;
    }

    const customers = generateCustomers();

    const monthlySpend = {
      Jan: 7200, Feb: 7600, Mar: 8100, Apr: 7900, May: 8500, Jun: 8900,
      Jul: 9100, Aug: 9350, Sep: 9600, Oct: 9800, Nov: 10200, Dec: 10900
    };

    const transactionsByCategory = {
      Grocery: 220,
      Travel: 140,
      Dining: 175,
      Entertainment: 130,
      Utilities: 155,
      Shopping: 210
    };

    const regionFilter = document.getElementById("regionFilter");
    const segmentFilter = document.getElementById("segmentFilter");
    const kpiContainer = document.getElementById("kpiContainer");

    let charts = {};

    function uniqueValues(data, key) {
      return [...new Set(data.map(d => d[key]))];
    }

    function formatCurrency(value) {
      return value.toLocaleString("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 });
    }

    function filteredData() {
      const region = regionFilter.value;
      const segment = segmentFilter.value;

      return customers.filter(c =>
        (region === "All" || c.region === region) &&
        (segment === "All" || c.segment === segment)
      );
    }

    function renderKPIs(data) {
      const totalCustomers = data.length;
      const totalSpend = data.reduce((sum, c) => sum + c.total_spend, 0);
      const avgSpend = totalCustomers ? totalSpend / totalCustomers : 0;
      const activeCount = data.filter(c => c.is_active).length;
      const activePct = totalCustomers ? (activeCount / totalCustomers) * 100 : 0;
      const segments = data.reduce((acc, c) => {
        acc[c.segment] = (acc[c.segment] || 0) + 1;
        return acc;
      }, {});

      const topSegment = Object.entries(segments).sort((a, b) => b[1] - a[1])[0]?.[0] || "N/A";

      const cards = [
        { title: "Total Customers", value: totalCustomers.toLocaleString(), icon: "👥" },
        { title: "Total Revenue", value: formatCurrency(totalSpend), icon: "💰" },
        { title: "Avg Spend / Customer", value: formatCurrency(avgSpend), icon: "📈" },
        { title: "Active Customers %", value: `${activePct.toFixed(1)}%`, icon: "✅" },
        { title: "Top Segment", value: topSegment, icon: "🏷️" }
      ];

      kpiContainer.innerHTML = cards.map(card => `
        <div class="kpi">
          <span class="icon">${card.icon}</span>
          <h3>${card.title}</h3>
          <div class="value">${card.value}</div>
        </div>
      `).join("");
    }

    function destroyCharts() {
      Object.values(charts).forEach(chart => chart.destroy());
      charts = {};
    }

    function renderCharts(data) {
      destroyCharts();

      const byRegion = data.reduce((acc, c) => {
        acc[c.region] = (acc[c.region] || 0) + c.total_spend;
        return acc;
      }, {});

      const bySegment = data.reduce((acc, c) => {
        acc[c.segment] = (acc[c.segment] || 0) + 1;
        return acc;
      }, {});

      const revenueBySegment = data.reduce((acc, c) => {
        acc[c.segment] = (acc[c.segment] || 0) + c.total_spend;
        return acc;
      }, {});

      const active = data.filter(c => c.is_active).length;
      const inactive = data.length - active;

      const chartDefaults = {
        responsive: true,
        plugins: {
          legend: { labels: { color: "#334155" } },
          tooltip: { enabled: true }
        },
        animation: { duration: 900, easing: "easeOutQuart" }
      };

      charts.regionSpend = new Chart(document.getElementById("regionSpendChart"), {
        type: "bar",
        data: {
          labels: Object.keys(byRegion),
          datasets: [{
            label: "Spend",
            data: Object.values(byRegion),
            backgroundColor: "rgba(47, 116, 181, 0.8)",
            borderRadius: 8
          }]
        },
        options: {
          ...chartDefaults,
          scales: { y: { ticks: { callback: val => `$${val}` } } }
        }
      });

      charts.segmentPie = new Chart(document.getElementById("segmentPieChart"), {
        type: "pie",
        data: {
          labels: Object.keys(bySegment),
          datasets: [{
            data: Object.values(bySegment),
            backgroundColor: ["#1f4e79", "#2aa198", "#f59e0b"],
            hoverOffset: 10
          }]
        },
        options: chartDefaults
      });

      charts.monthlyTrend = new Chart(document.getElementById("monthlyTrendChart"), {
        type: "line",
        data: {
          labels: Object.keys(monthlySpend),
          datasets: [{
            label: "Monthly Spend",
            data: Object.values(monthlySpend),
            borderColor: "#2f74b5",
            backgroundColor: "rgba(47, 116, 181, 0.15)",
            fill: true,
            tension: 0.35,
            pointRadius: 4,
            pointHoverRadius: 7
          }]
        },
        options: {
          ...chartDefaults,
          interaction: { mode: "index", intersect: false }
        }
      });

      charts.activeInactive = new Chart(document.getElementById("activeInactiveChart"), {
        type: "doughnut",
        data: {
          labels: ["Active", "Inactive"],
          datasets: [{
            data: [active, inactive],
            backgroundColor: ["#2e7d32", "#d9534f"],
            hoverOffset: 8
          }]
        },
        options: chartDefaults
      });

      charts.revenueSegment = new Chart(document.getElementById("revenueSegmentChart"), {
        type: "bar",
        data: {
          labels: Object.keys(revenueBySegment),
          datasets: [{
            label: "Revenue",
            data: Object.values(revenueBySegment),
            backgroundColor: ["#1f4e79", "#2aa198", "#f59e0b"],
            borderRadius: 8
          }]
        },
        options: {
          ...chartDefaults,
          scales: { y: { ticks: { callback: val => `$${val}` } } }
        }
      });

      charts.categoryTx = new Chart(document.getElementById("categoryTxChart"), {
        type: "bar",
        data: {
          labels: Object.keys(transactionsByCategory),
          datasets: [{
            label: "Transactions",
            data: Object.values(transactionsByCategory),
            backgroundColor: "rgba(42, 161, 152, 0.8)",
            borderRadius: 8
          }]
        },
        options: chartDefaults
      });

      charts.segmentBar = new Chart(document.getElementById("segmentBarChart"), {
        type: "bar",
        data: {
          labels: Object.keys(bySegment),
          datasets: [{
            label: "Customers",
            data: Object.values(bySegment),
            backgroundColor: ["#1f4e79", "#2aa198", "#f59e0b"],
            borderRadius: 8
          }]
        },
        options: chartDefaults
      });

      charts.revenueRegion = new Chart(document.getElementById("revenueRegionChart"), {
        type: "bar",
        data: {
          labels: Object.keys(byRegion),
          datasets: [{
            label: "Revenue",
            data: Object.values(byRegion),
            backgroundColor: "rgba(31, 78, 121, 0.85)",
            borderRadius: 10
          }]
        },
        options: {
          ...chartDefaults,
          scales: { y: { ticks: { callback: val => `$${val}` } } }
        }
      });
    }

    function renderKeyInsights(data) {
      const byRegion = data.reduce((acc, c) => {
        acc[c.region] = (acc[c.region] || 0) + c.total_spend;
        return acc;
      }, {});
      
      const bySegment = data.reduce((acc, c) => {
        acc[c.segment] = (acc[c.segment] || 0) + c.total_spend;
        return acc;
      }, {});

      const topRegion = Object.entries(byRegion).sort((a, b) => b[1] - a[1])[0];
      const topSegment = Object.entries(bySegment).sort((a, b) => b[1] - a[1])[0];
      const avgSpend = data.length ? data.reduce((sum, c) => sum + c.total_spend, 0) / data.length : 0;
      const activeRate = data.length ? (data.filter(c => c.is_active).length / data.length * 100).toFixed(1) : 0;
      const avgIncome = data.length ? data.reduce((sum, c) => sum + c.income, 0) / data.length : 0;

      const insights = [
        `${topRegion ? topRegion[0] : 'N/A'} Region leads with ${formatCurrency(topRegion ? topRegion[1] : 0)} in total spending`,
        `${topSegment ? topSegment[0] : 'N/A'} segment generates ${formatCurrency(topSegment ? topSegment[1] : 0)} in revenue`,
        `Average customer spend is ${formatCurrency(avgSpend)}, with average income of ${formatCurrency(avgIncome)}`,
        `${activeRate}% of customers remain active, indicating strong engagement levels`
      ];

      const container = document.getElementById("keyInsights");
      container.innerHTML = insights.map(insight => `<div class="insight-item">• ${insight}</div>`).join("");
    }

    function renderRecommendations(data) {
      const bySegment = data.reduce((acc, c) => {
        acc[c.segment] = (acc[c.segment] || 0) + c.total_spend;
        return acc;
      }, {});

      const recommendations = [
        {
          title: "Focus on High-Value Segment Growth",
          desc: "High-segment customers drive the most revenue. Develop premium products and personalized services to expand this segment by 20%."
        },
        {
          title: "Activate Dormant Customers",
          desc: "Re-engage inactive customers with targeted campaigns offering rewards or credit line increases. Target customers with 30+ day inactivity."
        },
        {
          title: "Regional Expansion Strategy",
          desc: "Allocate more marketing resources to underperforming regions. Conduct market analysis and localize offerings to increase regional penetration."
        },
        {
          title: "Cross-Sell Opportunities",
          desc: "Medium-segment customers show potential for upselling. Create bundled offers combining credit services with insurance or investment products."
        }
      ];

      const container = document.getElementById("recommendations");
      container.innerHTML = recommendations.map(rec => `
        <div class="recommendation-item">
          <strong>→ ${rec.title}</strong>
          <p>${rec.desc}</p>
        </div>
      `).join("");
    }

    function populateFilters() {
      const regions = ["All", ...uniqueValues(customers, "region")];
      const segments = ["All", ...uniqueValues(customers, "segment")];

      regionFilter.innerHTML = regions.map(r => `<option>${r}</option>`).join("");
      segmentFilter.innerHTML = segments.map(s => `<option>${s}</option>`).join("");
    }

    function refreshDashboard() {
      const data = filteredData();
      renderKPIs(data);
      renderCharts(data);
      renderKeyInsights(data);
      renderRecommendations(data);
    }

    function setupTabs() {
      document.querySelectorAll(".tab").forEach(tab => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
          document.querySelectorAll(".tab-content").forEach(content => content.classList.remove("active"));

          tab.classList.add("active");
          document.getElementById(tab.dataset.tab).classList.add("active");
        });
      });
    }

    regionFilter.addEventListener("change", refreshDashboard);
    segmentFilter.addEventListener("change", refreshDashboard);

    populateFilters();
    setupTabs();
    refreshDashboard();
  </script>
</body>
</html>
